<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Binary Learning Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- LEFT PANEL -->
  <div class="panel">
    <h2>Concept</h2>
    <p id="conceptText">Press Start to begin</p>

    <h3>Examples</h3>
    <button onclick="loadExample('101','11')">101 × 11</button>
    <button onclick="loadExample('110','101')">110 × 101</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1>Binary Learning Simulator</h1>
    <p class="subtitle">Interactive step-by-step visualization</p>

    <div class="input-box">
      <input id="num1" placeholder="First binary">
      <input id="num2" placeholder="Second binary">
    </div>

    <div class="controls">
      <button onclick="start()">Start</button>
      <button onclick="nextStep()">Next Step</button>
      <button onclick="autoPlay()">Auto ▶</button>
      <button onclick="pause()">Pause ⏸</button>
      <button class="clear-btn" onclick="resetAll()">Clear 🧹</button>
    </div>

    <div id="display"></div>
    <div id="decimal"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <h2>Step Info</h2>
    <pre id="info">No step yet</pre>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
