<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Binary Multiplier Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>Binary Multiplier</h1>
    <p class="subtitle">Step-by-step visualization using shift-and-add</p>

    <div class="input-box">
      <input type="text" id="num1" placeholder="First binary (e.g. 101)">
      <input type="text" id="num2" placeholder="Second binary (e.g. 11)">
      <button onclick="multiply()">Multiply</button>
    </div>

    <div class="output">
      <h2>Process</h2>
      <div id="steps"></div>

      <h2>Result</h2>
      <div id="result"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
